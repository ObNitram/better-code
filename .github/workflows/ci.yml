name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check (lint + validate JSON)
        run: npm run check

      - name: Compile
        run: npm run compile

      - name: Show extension file tree
        run: npx vsce ls

      - name: Build VSIX
        run: npm run build:vsix

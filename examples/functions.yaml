# ObniCode context actions example.
#
# Dynamic variables available in command, cwd, and terminalName:
#
# ${path}
#   Shell-quoted absolute path of the selected file or folder.
#   Use this in shell commands when passing a path as an argument.
#
# ${rawPath}
#   Raw absolute path of the selected file or folder.
#   Use this for cwd or inside already quoted command strings.
#
# ${relativePath}
#   Shell-quoted path of the selected file or folder relative to the workspace.
#
# ${rawRelativePath}
#   Raw path of the selected file or folder relative to the workspace.
#
# ${workspaceFolder}
#   Shell-quoted absolute path of the workspace folder.
#
# ${rawWorkspaceFolder}
#   Raw absolute path of the workspace folder.
#   Recommended for cwd.
#
# ${fileBasename}
#   Shell-quoted basename of the selected file or folder.
#
# ${rawFileBasename}
#   Raw basename of the selected file or folder.
#
# ${fileDirname}
#   Shell-quoted absolute path of the selected file parent directory.
#
# ${rawFileDirname}
#   Raw absolute path of the selected file parent directory.
#   Useful for cwd when the selected target is a file.
#
# ${selectedPaths}
#   Space-separated list of shell-quoted absolute paths for all selected files or folders.
#
# ${selectedType}
#   Either "file" or "folder" for the primary selected item.
#
# match:
#   Optional JavaScript regular expression tested against the workspace-relative path.
#   Paths are normalized with "/" separators. When multiple items are selected,
#   every selected path must match.

functions:
  - name: Print selected path
    description: Echo the selected file or folder path
    command: echo ${path}

  - name: List selected folder
    description: Run ls in the selected folder
    match: ^src($|/)
    cwd: ${rawPath}
    terminalName: List selected folder
    command: ls -la

  - name: Show workspace and selected item
    match: ^(src|schemas|\.vscode)(/|$)
    command: |
      echo "Workspace: ${rawWorkspaceFolder}"
      echo "Selected: ${rawPath}"
      echo "Relative: ${rawRelativePath}"
      echo "Type: ${selectedType}"

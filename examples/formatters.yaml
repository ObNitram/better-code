# ObniCode formatters example.
#
# Formatter commands receive the full document content on stdin and must write
# the formatted document content to stdout. The document is replaced only when
# the command exits with code 0.
#
# Dynamic variables available in command and cwd:
#
# ${path}
#   Shell-quoted absolute path of the document being formatted.
#   Use this in shell commands when passing a path as an argument.
#
# ${rawPath}
#   Raw absolute path of the document being formatted.
#   Use this for cwd or inside already quoted command strings.
#
# ${relativePath}
#   Shell-quoted document path relative to the workspace.
#
# ${rawRelativePath}
#   Raw document path relative to the workspace.
#
# ${workspaceFolder}
#   Shell-quoted absolute path of the workspace folder.
#
# ${rawWorkspaceFolder}
#   Raw absolute path of the workspace folder.
#   Recommended for cwd.
#
# ${fileBasename}
#   Shell-quoted document basename.
#
# ${rawFileBasename}
#   Raw document basename.
#
# ${fileDirname}
#   Shell-quoted absolute path of the document parent directory.
#
# ${rawFileDirname}
#   Raw absolute path of the document parent directory.
#   Useful for cwd.
#
# ${selectedPaths}
#   For formatters, this contains only the current document path as a shell-quoted value.
#
# ${selectedType}
#   For formatters, this is "file".
#
# language:
#   VS Code language id handled by this formatter, such as typescript,
#   javascript, json, yaml, python, or markdown.
#
# languages:
#   List of VS Code language ids handled by this formatter.
#
# match:
#   Optional JavaScript regular expression tested against the workspace-relative path.
#   Paths are normalized with "/" separators.

formatters:
  - language: json
    match: ^schemas/.*\.json$
    command: node -e "let input=''; process.stdin.on('data', c => input += c); process.stdin.on('end', () => process.stdout.write(JSON.stringify(JSON.parse(input), null, 2) + '\n'));"

  - languages:
      - javascript
      - typescript
    match: ^src/.*\.[jt]s$
    command: npx prettier --stdin-filepath ${path}

# ObniCode configuration example.
#
# Formatter commands receive the full document content on stdin and must write
# the formatted document content to stdout. The document is replaced only when
# the command exits with code 0.
#
# Background tasks are launched when the extension activates. Their stdout and
# stderr are written to the output channel configured with outputChannel.
#
# Dynamic variables available in explorerViewAction command/cwd/terminalName and formatter command/cwd:
#
# ${path}
#   Shell-quoted absolute path of the selected file, folder, or formatted document.
#   Use this in shell commands when passing a path as an argument.
#
# ${rawPath}
#   Raw absolute path of the selected file, folder, or formatted document.
#   Use this for cwd or inside already quoted command strings.
#
# ${relativePath}
#   Shell-quoted path relative to the workspace.
#
# ${rawRelativePath}
#   Raw path relative to the workspace.
#
# ${workspaceFolder}
#   Shell-quoted absolute path of the workspace folder.
#
# ${rawWorkspaceFolder}
#   Raw absolute path of the workspace folder.
#   Recommended for cwd.
#
# ${fileBasename}
#   Shell-quoted basename of the selected file, folder, or formatted document.
#
# ${rawFileBasename}
#   Raw basename of the selected file, folder, or formatted document.
#
# ${fileDirname}
#   Shell-quoted absolute path of the parent directory.
#
# ${rawFileDirname}
#   Raw absolute path of the parent directory.
#   Useful for cwd.
#
# ${selectedPaths}
#   Space-separated list of shell-quoted absolute paths for all selected files or folders.
#   For formatters, this contains only the current document path.
#
# ${selectedType}
#   Either "file" or "folder" for explorer view actions.
#   For formatters, this is "file".
#
# match:
#   Optional JavaScript regular expression tested against the workspace-relative path.
#   Paths are normalized with "/" separators. For explorer view actions with multiple selected
#   items, every selected path must match.

explorerViewActions:
  - name: Print selected path
    description: Echo the selected file or folder path
    command: echo ${path}
    # By default, stdout/stderr are logged to the "obnicode.explorerViewActions" output channel.
    useTerminal: false

  - name: List selected folder
    description: Run ls in the selected folder in an integrated terminal
    match: ^src($|/)
    cwd: ${rawPath}
    terminalName: List selected folder
    useTerminal: true
    command: ls -la

  - name: Show workspace and selected item
    match: ^(src|schemas|\.vscode)(/|$)
    command: |
      echo "Workspace: ${rawWorkspaceFolder}"
      echo "Selected: ${rawPath}"
      echo "Relative: ${rawRelativePath}"
      echo "Type: ${selectedType}"

backgroundTasks:
  - name: Print workspace at startup
    command: 'echo "Workspace ready: ${rawWorkspaceFolder}"'
    cwd: ${rawWorkspaceFolder}
    outputChannel: obnicode.backgroundTasks
    useTerminal: false

  - name: Start development server
    command: npm run watch
    cwd: ${rawWorkspaceFolder}
    useTerminal: true
    terminalName: ObniCode watch

formatters:
  - language: json
    match: ^schemas/.*\.json$
    command: node -e "let input=''; process.stdin.on('data', c => input += c); process.stdin.on('end', () => process.stdout.write(JSON.stringify(JSON.parse(input), null, 2) + '\n'));"

  - languages:
      - javascript
      - typescript
    match: ^src/.*\.[jt]s$
    command: npx prettier --stdin-filepath ${path}
